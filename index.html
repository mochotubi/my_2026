<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>My diary</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>My diary</header>

<div class="container">

  <!-- 📚 BIBLIOTECA -->
  <div id="home">
    <button onclick="newMagazine()">+ Nueva revista</button>
    <div id="list"></div>
  </div>

  <!-- ✍️ EDITOR -->
  <div id="editor" style="display:none;">
    <div class="controls">
      <button onclick="addTitle()">Título</button>
      <button onclick="addText()">Texto</button>
      <button onclick="addImage()">Imagen</button>
      <button onclick="addQuote()">Frase</button>
      <button onclick="saveMagazine()">Guardar</button>
    </div>

    <div id="page" class="page"></div>
  </div>

  <!-- 📖 VISOR -->
  <div id="viewer" style="display:none;">
    <button onclick="goHome()">← Volver</button>
    <div id="viewContent" class="page"></div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
